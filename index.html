<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Effects MVP</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111; /* Dark background to make particles pop */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 280px;
            z-index: 10;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        input[type="color"] {
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 30px;
            padding: 0;
        }

        input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        
        .hint {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="controls-panel">
        <h2>Particle Physics</h2>
        
        <div class="control-group">
            <label for="speedCtrl">Burst Speed (<span id="speedVal">5</span>)</label>
            <input type="range" id="speedCtrl" min="1" max="15" step="1" value="5">
        </div>

        <div class="control-group">
            <label for="gravityCtrl">Gravity (<span id="gravityVal">0.2</span>)</label>
            <input type="range" id="gravityCtrl" min="-0.5" max="2" step="0.1" value="0.2">
        </div>

        <div class="control-group">
            <label for="countCtrl">Particle Count (<span id="countVal">50</span>)</label>
            <input type="range" id="countCtrl" min="10" max="200" step="10" value="50">
        </div>

        <div class="control-row" style="margin-bottom: 15px;">
            <label for="colorCtrl">Particle Color</label>
            <input type="color" id="colorCtrl" value="#00ffcc">
        </div>

        <div class="control-row">
            <label for="trailCtrl">Mouse Trail</label>
            <input type="checkbox" id="trailCtrl" checked>
        </div>

        <div class="control-row" style="margin-top: 10px;">
            <label for="autoCtrl">Auto Mode (Ambient)</label>
            <input type="checkbox" id="autoCtrl">
        </div>

        <div class="hint">Click anywhere on the screen!</div>
    </div>

    <canvas id="particleCanvas"></canvas>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // UI Controls
        const speedCtrl = document.getElementById('speedCtrl');
        const gravityCtrl = document.getElementById('gravityCtrl');
        const countCtrl = document.getElementById('countCtrl');
        const colorCtrl = document.getElementById('colorCtrl');
        const trailCtrl = document.getElementById('trailCtrl');
        const autoCtrl = document.getElementById('autoCtrl');

        // Value displays
        const speedVal = document.getElementById('speedVal');
        const gravityVal = document.getElementById('gravityVal');
        const countVal = document.getElementById('countVal');

        // Update UI text dynamically
        speedCtrl.addEventListener('input', (e) => speedVal.textContent = e.target.value);
        gravityCtrl.addEventListener('input', (e) => gravityVal.textContent = e.target.value);
        countCtrl.addEventListener('input', (e) => countVal.textContent = e.target.value);

        let particles = [];
        let autoModeInterval;

        // Resize Canvas to fit screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle Class
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2; // Random size between 2 and 7
                
                // Base speed and random angle
                const speedMulti = parseFloat(speedCtrl.value);
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * speedMulti;
                
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                
                this.color = colorCtrl.value;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01; // How fast it fades out
                this.gravity = parseFloat(gravityCtrl.value);
            }

            update() {
                this.vy += this.gravity; // Apply gravity
                this.x += this.vx;       // Apply velocity X
                this.y += this.vy;       // Apply velocity Y
                this.alpha -= this.decay; // Fade out
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Spawn a burst of particles
        function spawnParticles(x, y, isTrail = false) {
            const count = isTrail ? 2 : parseInt(countCtrl.value); // Less particles for trail
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // Interaction Listeners
        canvas.addEventListener('mousedown', (e) => {
            spawnParticles(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (trailCtrl.checked) {
                spawnParticles(e.clientX, e.clientY, true);
            }
        });

        // Auto Mode logic
        autoCtrl.addEventListener('change', (e) => {
            if (e.target.checked) {
                autoModeInterval = setInterval(() => {
                    const randomX = Math.random() * canvas.width;
                    const randomY = Math.random() * (canvas.height / 2); // Spawn mostly in top half
                    spawnParticles(randomX, randomY);
                }, 400); // Burst every 400ms
            } else {
                clearInterval(autoModeInterval);
            }
        });

        // Main Animation Loop
        function animate() {
            // Clear canvas completely each frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw all particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();

                // Remove dead particles to prevent memory leaks
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // Start loop
        animate();
    </script>
</body>
</html>
